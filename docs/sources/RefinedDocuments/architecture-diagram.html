:root{

.leg-box{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.print-btn{float:right;background:var(--accent);border:none;color:white;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:-4px}
.print-btn:hover{background:#1d4fd8}
@media print{body{background:#fff;color:#111}.print-btn{display:none}}
</style>
