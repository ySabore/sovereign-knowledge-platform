# Example edge reverse proxy: TLS termination, static frontend, API upstream.
# Replace server_name and paths; place TLS certs at /etc/nginx/ssl/.

upstream skp_api {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl http2;
    server_name skp.example.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://skp_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/skp-web;
        try_files $uri $uri/ /index.html;
    }
}
